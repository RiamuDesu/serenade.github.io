<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serenade - Account Settings</title>
<link rel="stylesheet" href="settings_style.css">
</head>

<body>

<div class="header">SERENADE</div>

<div class="container">

    <div class="profile">
        <img src="https://via.placeholder.com/90">
        <h3>Your Name ♡</h3>
    </div>

    <form>

        <div class="section">Profile Information</div>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" placeholder="Enter full name">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="Enter email">
        </div>

        <div class="form-group">
            <label>Username</label>
            <input type="text" placeholder="Enter username">
        </div>

        <div class="section">Change Password</div>

        <div class="form-group">
            <label>Current Password</label>
            <input type="password">
        </div>

        <div class="form-group">
            <label>New Password</label>
            <input type="password">
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password">
        </div>

        <div class="section">Bio / Message</div>

        <div class="note-box">
            Write something sweet... ♡
        </div>

        <button class="btn">Save Changes</button>

    </form>

</div>

</body>
</html>
