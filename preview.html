<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serenade</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

    <link href="preview_style.css" rel="stylesheet">
    <script src="cookies.js"></script>
    

</head>
<body>

    <header>
        <input type="checkbox" id="menu-toggle">
        <label for="menu-toggle" class="menu-btn">
            ☰
        </label>
            
        <div class="nav-menu">
            <label for="menu-toggle" class="close-btn">✕</label>
            <a href="index.html">Home</a>
            <a href="create.html">Create Letter</a>
            <a href="preview.html">Mail</a>
            <a href="search.html">Search</a>
        </div>

        <div class="title">
            SERENADE
        </div>

        <div class="settings">
            <a href="settings.html"><button>⚙</button></a>
        </div>

        <div class="login">
           <button onclick="logoutUser()">Logout</button>
        </div>
    </header>


    <div class="main">
        <div class="card">
            <h2>
                OPEN YOUR SERENADE
            </h2>

            <div class="album">
                <img class="heart" src="letter_heart.png">

            </div>

            <div class="song-title" id="song-title">
                All of Me - John Legend
            </div>


            <audio id="audio-element" src="music/John Legend - All of Me.mp3"></audio>

            <div class="progress-container">
                <span id="current-time">0:00</span>
                <input type="range" id="progress-bar" value="0" max="100">
                <span id="duration">0:00</span>
            </div>

            <div class="controls">
                <button class="skip-btn" onclick="skipTime(-10)">-10s</button>
                <button id="play-btn" class="main-btn" onclick="togglePlay()">Play</button>
                <button class="skip-btn" onclick="skipTime(10)">+10s</button>
            </div>

            <br><br>
            <iframe 
                id="letterFrame"
                title="Love Letter"
                style="width: 100%; max-width: 600px; height: 400px; border: 2px solid #f3c3d2; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);"
                srcdoc='
                    <html>
                        <head>
                            <style>
                                body {
                                    font-family: "Georgia", serif;
                                    line-height: 1.5;
                                    color: #4a4a4a;
                                    background-color: #fffafb;
                                    padding: 30px;
                                    margin: 0;
                                    font-size:20px;
                                }
                                .letter-content {
                                    white-space: pre-line;
                                }
                                h2 {
                                    color: #d63384; font-size: 1.5rem; margin-top: 0; 
                                }
                            </style>
                        </head>
                        <body>
                            <div class="letter-content">
                                <h2>My Love,</h2>
                                I don’t think I say this enough, but you mean so much to me. In a world that often feels busy and overwhelming, you are the one who makes everything feel calm and right. Just thinking about you brings me comfort and a quiet kind of happiness I can’t really explain.

                                I love the little things about you—the way you smile, the way you talk about the things you care about, and even the small moments we share that others might not notice. Those are the moments I treasure the most.

                                Being with you has taught me what it truly means to care for someone, to be patient, and to appreciate love in its simplest form. I’m grateful for you every single day, and I hope I can make you feel just as loved as you make me feel.

                                No matter what happens, I want you to know that you have someone who believes in you, supports you, and cares for you deeply.
                            </div>
                        </body>
                    </html>
                '>
            </iframe>
        </div>
    </div>


    <div class="gallery-title">
        <span>
            GALLERY OF HEARTS
        </span>
    </div>


    <div class="board">
        <div class="polaroid" onclick="loadMemory(1)">
            <div class="pin"></div>
            <img src="img1.jpg">
        </div>
        <div class="polaroid">

            <div class="pin"></div>
            <img src="img2.jpg">
        </div>
        <div class="polaroid">
            <div class="pin"></div>
            <img src="img3.jpg">
        </div>
        <div class="polaroid">
            <div class="pin"></div>
            <img src="img4.png">
        </div>
    </div>
    <script src="musicplayer.js"></script>
</body>
</html>
