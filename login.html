<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serenade Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <link href="login_style.css" rel="stylesheet">
    <script src="cookies.js"></script>
</head>

<body>

    <header>
        <div class="title">
            SERENADE
        </div>
    </header>


    <div class="container">

        <div class="login-box">

            <div class="logo">
                <img src="pics/heart.png" alt="Serenade Logo">
            </div>


            <form action="index.html">

                <label for="name">
                    Enter your Username or Email:
                </label>

                <input type="text" id="name" placeholder="Input username or email here">

                <label for="password">
                    Enter your Password:
                </label>
                <input type="password" id="password" placeholder="Input password here">

                <div class="forgot">
                    <a href="#">Forgot your Password?</a>
                </div>

                <div class="heart-container">
                    <input type="submit" value="Login" class="login-btn" onclick="transferData()">
                    <span class="heart" style="left:10%;">❤️</span>
                    <span class="heart" style="left:30%; animation-delay: 0.2s;">💖</span>
                    <span class="heart" style="left:50%; animation-delay: 0.4s;">💕</span>
                    <span class="heart" style="left:70%; animation-delay: 0.6s;">💘</span>
                    <span class="heart" style="left:90%; animation-delay: 0.8s;">💗</span>
                </div>
                
                <label>
                    Don't have an account?
                </label>
                <div class="heart-container">
                    <a href="register.html"><input type="button" value="Register" class="login-btn"></a>
                    <span class="heart" style="left:10%;">❤️</span>
                    <span class="heart" style="left:30%; animation-delay: 0.2s;">💖</span>
                    <span class="heart" style="left:50%; animation-delay: 0.4s;">💕</span>
                    <span class="heart" style="left:70%; animation-delay: 0.6s;">💘</span>
                    <span class="heart" style="left:90%; animation-delay: 0.8s;">💗</span>
                </div>
                
                

            </form>

        </div>

    </div>

</body>

</html>
